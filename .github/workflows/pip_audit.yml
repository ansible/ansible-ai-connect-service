name: wisdom-service - pip-audit

on:
  push:
    # tags:
    #   - v*
    branches:
      - main
      - 'stable-*'
    paths:
      - .github/workflows/pip_audit.yml
      - ansible_ai_connect/**
      - pyproject.toml
      - uv.lock
      - requirements.txt
  pull_request:
    branches:
      - main
      - 'stable-*'
    paths:
      - .github/workflows/pip_audit.yml
      - ansible_ai_connect/**
      - pyproject.toml
      - uv.lock
      - requirements.txt
permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: install
        run: |
          python -m venv env/
          source env/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          # See: https://github.com/advisories/GHSA-r9hx-vwmv-q579
          pip install --upgrade setuptools
      - name: Create CA symlink to use RH's certifi on ubuntu-latest
        run: |
          sudo mkdir -p /etc/pki/tls/certs
          sudo ln -s /etc/ssl/certs/ca-certificates.crt /etc/pki/tls/certs/ca-bundle.crt
      - uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          virtual-environment: env/
          ignore-vulns: |
            # pip symlink extraction vulnerability - CI pip version varies
            # See: https://github.com/advisories/GHSA-4xh5-x5gv-qwph
            GHSA-4xh5-x5gv-qwph
            # No fix available yet for pygments ReDoS
            # See: https://www.cve.org/CVERecord?id=CVE-2026-4539
            CVE-2026-4539
